name: Validate CyberOps.html

# Integrity gate for the single-file app. Runs validate.py, which extracts
# every embedded data array, parses it, runs `node --check` on the script
# block, and cross-references categories / tags / variables. See CLAUDE.md.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node (for node --check)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run validator
        run: python3 validate.py
